name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: publish
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AEB771: ${{ secrets.AEB771 }}
          BB636B: ${{ secrets.BB636B }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AEB771', '')
          bm = os.environ.get('BB636B', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 8e1b8906ea242835 -->', gm)
          if bm:
              s2 = s2.replace('<!-- ca040727ddea124634bc -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
