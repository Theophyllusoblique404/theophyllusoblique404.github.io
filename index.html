<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OnScreen Player</title>
<style>
  :root{
    --bar:#111b2b; --bar-text:#f2f5fa;
    --blue:#1462c4; --blue-deep:#0d3f80;
    --ink:#182635; --ink-dim:#5b6b7c; --line:#dde3ea;
    --gold:#e0a63c; --ok:#2e9e6b; --warn:#c98a1f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:#000;color:var(--ink)}
  .tv{
    width:100vw;height:100vh;background:#f7f8fa;
    display:grid;
    grid-template-rows:5.5vh 55fr 5vh 45fr 4.5vh;
    grid-template-areas:"topbar" "media" "brand" "board" "ticker";
    cursor:none;
  }

  .topbar{
    grid-area:topbar;background:var(--bar);color:var(--bar-text);
    display:flex;align-items:center;gap:.8vh;padding:0 1.6vh;
    font-size:2.4vh;font-variant-numeric:tabular-nums;
  }
  .topbar .wx{display:flex;align-items:center;gap:.8vh}
  .topbar .fx{margin-left:auto;color:#bcd0e8}
  .topbar .clock{
    background:var(--blue);color:#fff;font-weight:700;border-radius:.8vh;
    padding:.5vh 1.4vh;margin-left:1.2vh;font-size:2.7vh;letter-spacing:.02em;
  }

  .media{grid-area:media;position:relative;overflow:hidden;background:#eceff3}
  .ad{
    position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;padding:8% 9%;opacity:0;transition:opacity .8s ease;
  }
  .ad.on{opacity:1}
  .ad .tag{font-size:1.7vh;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.6vh;opacity:.85}
  .ad h2{font-size:4.6vh;line-height:1.12;font-weight:800;text-wrap:balance;margin-bottom:1.4vh}
  .ad p{font-size:2.3vh;line-height:1.5;max-width:24em;opacity:.92}
  .ad .cta{margin-top:2.2vh;font-size:2.1vh;font-weight:700}
  .ad.img{padding:0}
  .ad.img img{width:100%;height:100%;object-fit:cover}
  .ad.verde{background:linear-gradient(160deg,#123d23,#1f7a45 60%,#2fa35d);color:#f0fff5}
  .ad.dourado{background:linear-gradient(160deg,#28180a,#7a4a12 60%,#b06f1c);color:#fdf4e2}
  .ad.azul{background:linear-gradient(160deg,#101c36,#1d3e7e 60%,#2f5cb4);color:#eef3ff}
  .ad.claro{background:#f4f5f6;color:#1c2530}
  .ad.claro .tag{color:var(--ink-dim)}
  .ad.claro h2{letter-spacing:.04em;text-transform:uppercase}
  .ad.claro p{color:var(--ink-dim);text-transform:uppercase;letter-spacing:.12em;font-size:1.8vh}
  .ad.claro .cta{color:var(--blue)}
  .ad.news{padding:0;background:#101820}
  .ad.news img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .ad.news .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 40%,rgba(0,0,0,.88))}
  .ad.news .ninfo{position:absolute;left:0;right:0;bottom:0;padding:0 3vh 3.2vh;text-align:left;display:flex;flex-direction:column;align-items:flex-start;gap:1.2vh}
  .ad.news .chip{background:#e0632c;color:#fff;font-size:1.6vh;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.5vh 1.2vh;border-radius:.5vh}
  .ad.news h2{color:#fff;font-size:3.3vh;line-height:1.2;text-align:left;margin:0;text-shadow:0 1px 6px rgba(0,0,0,.6)}
  .progress{position:absolute;left:0;bottom:0;height:.5vh;background:var(--gold);width:0%;z-index:2}
  .progress.run{animation:fill var(--dur,8s) linear forwards}
  @keyframes fill{from{width:0}to{width:100%}}

  .brand{
    grid-area:brand;background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;padding:0 1.8vh;
  }
  .brand .logo{font-size:2.6vh;font-weight:800;color:var(--blue)}
  .brand .logo span{color:var(--ink)}
  .brand .fone{font-size:2.1vh;color:var(--ink-dim);font-variant-numeric:tabular-nums}

  .board{grid-area:board;background:#fff;padding:1.6vh 1.8vh 1.2vh;display:flex;flex-direction:column;gap:1.1vh;min-height:0}
  .board .head{
    background:var(--blue-deep);color:#fff;border-radius:.8vh;padding:1vh 1.6vh;
    font-size:2.1vh;font-weight:700;letter-spacing:.04em;display:flex;justify-content:space-between;gap:1vh;
  }
  .board .head span:last-child{font-weight:500;opacity:.85}
  .notice{flex:1;min-height:0;overflow:hidden;border:1px solid var(--line);border-radius:1vh;padding:1.6vh 1.8vh;background:#fbfcfd}
  .notice h3{font-size:3vh;font-weight:700;margin-bottom:.8vh}
  .notice p{font-size:2.4vh;color:var(--ink-dim);line-height:1.45}
  .board .meta{display:flex;justify-content:space-between;align-items:center}
  .board .label{font-size:1.6vh;letter-spacing:.14em;text-transform:uppercase;color:var(--blue);font-weight:700}
  .status{display:flex;align-items:center;gap:.8vh;font-size:1.8vh;color:var(--ink-dim)}
  .dot{width:1vh;height:1vh;border-radius:50%;background:var(--ok);flex:none}
  .status.off .dot{background:var(--warn)}
  .status.off{color:var(--warn)}

  .ticker{grid-area:ticker;background:var(--bar);display:flex;align-items:center;overflow:hidden}
  .ticker .cap{
    flex:none;height:100%;display:flex;align-items:center;padding:0 1.6vh;
    background:var(--gold);color:#231a08;font-size:1.7vh;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
  }
  .rail{flex:1;overflow:hidden}
  .rail-inner{display:inline-flex;white-space:nowrap;animation:slide 60s linear infinite}
  .rail-inner span{font-size:2.2vh;padding:0 3.4vh;color:#e8eef6}
  @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  @media (prefers-reduced-motion:reduce){
    .rail-inner{animation:none}
    .progress.run{animation:none;width:100%}
    .ad{transition:none}
  }
</style>
</head>
<body>
<div class="tv">
  <div class="topbar">
    <span class="wx"><span id="wxIcon">☁️</span> <span id="wx">--°/--°</span> <span id="wd"></span></span>
    <span class="fx" id="fx"></span>
    <span class="clock" id="time">--:--</span>
  </div>
  <div class="media" id="media"><div class="progress" id="progress"></div></div>
  <div class="brand">
    <span class="logo">On<span>Screen</span></span>
    <span class="fone" id="fone"></span>
  </div>
  <div class="board">
    <div class="head"><span id="predio"></span><span>Comunicados</span></div>
    <div class="notice">
      <h3 id="nTitle"></h3>
      <p id="nBody"></p>
    </div>
    <div class="meta">
      <span class="label" id="nCount"></span>
      <span class="status" id="status"><span class="dot"></span><span id="statusTxt">Iniciando…</span></span>
    </div>
  </div>
  <div class="ticker">
    <span class="cap">Notícias</span>
    <div class="rail"><div class="rail-inner" id="rail"></div></div>
  </div>
</div>

<script>
(() => {
  // ---------- cache local: guarda o último dado bom de cada fonte ----------
  const save = (k, v) => { try { localStorage.setItem('os_' + k, JSON.stringify({ v, t: Date.now() })) } catch (e) {} };
  const load = (k) => { try { const d = JSON.parse(localStorage.getItem('os_' + k)); return d ? d.v : null } catch (e) { return null } };
  const loadTime = (k) => { try { const d = JSON.parse(localStorage.getItem('os_' + k)); return d ? d.t : 0 } catch (e) { return 0 } };

  let ultimaSincronizacao = Math.max(loadTime('config'), loadTime('noticias')) || null;
  let onlineOk = true;

  const status = document.getElementById('status'), statusTxt = document.getElementById('statusTxt');
  function pintarStatus() {
    status.classList.toggle('off', !onlineOk);
    if (onlineOk) { statusTxt.textContent = 'Conectado'; return }
    if (!ultimaSincronizacao) { statusTxt.textContent = 'Sem internet'; return }
    const min = Math.round((Date.now() - ultimaSincronizacao) / 60000);
    statusTxt.textContent = 'Offline · conteúdo salvo (' + (min < 60 ? min + ' min' : Math.round(min / 60) + ' h') + ')';
  }
  setInterval(pintarStatus, 30000);

  async function buscar(k, url, parse) {
    try {
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error(r.status);
      const v = parse ? parse(await r.json()) : await r.json();
      save(k, v); onlineOk = true; ultimaSincronizacao = Date.now(); pintarStatus();
      return v;
    } catch (e) {
      onlineOk = false; pintarStatus();
      return load(k);
    }
  }

  // ---------- relógio ----------
  const timeEl = document.getElementById('time');
  function tick() {
    const n = new Date();
    timeEl.textContent = n.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('wd').textContent = n.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '');
  }
  tick(); setInterval(tick, 1000);

  // ---------- configuração (anúncios + comunicados) ----------
  let cfg = null, adTimer = null, noticeTimer = null;
  let noticiasLista = [], nIdx = 0;

  function popularNoticia(el) {
    if (!noticiasLista.length) return;
    const n = noticiasLista[nIdx % noticiasLista.length]; nIdx++;
    el.querySelector('h2').textContent = n.titulo;
    const img = el.querySelector('img');
    if (n.imagem) { img.src = n.imagem; img.style.display = 'block'; }
    else { img.removeAttribute('src'); img.style.display = 'none'; }
  }

  function renderAnuncios() {
    const media = document.getElementById('media');
    const progress = document.getElementById('progress');
    media.querySelectorAll('.ad').forEach(el => el.remove());
    const ads = (cfg.anuncios || []).map(a => {
      const d = document.createElement('div');
      if (a.tipo === 'imagem') {
        d.className = 'ad img';
        d.innerHTML = '<img alt="">';
        d.querySelector('img').src = a.url;
      } else {
        d.className = 'ad ' + (a.cor || 'azul');
        d.innerHTML = '<div class="tag"></div><h2></h2><p></p><span class="cta"></span>';
        d.querySelector('.tag').textContent = a.tag || '';
        d.querySelector('h2').textContent = a.titulo || '';
        d.querySelector('p').textContent = a.texto || '';
        d.querySelector('.cta').textContent = a.rodape || '';
      }
      media.insertBefore(d, progress);
      return d;
    });
    // cartão de notícia com foto (estilo Eletromidia) entra na rotação
    if (cfg.noticiaNaRotacao !== false && noticiasLista.length) {
      const d = document.createElement('div');
      d.className = 'ad news'; d.id = 'adNews';
      d.innerHTML = '<img alt=""><div class="shade"></div><div class="ninfo"><span class="chip">Notícias · G1</span><h2></h2></div>';
      media.insertBefore(d, progress);
      ads.push(d);
    }
    if (!ads.length) return;
    const DUR = (cfg.duracaoAnuncioSegundos || 8) * 1000;
    progress.style.setProperty('--dur', DUR + 'ms');
    let cur = 0;
    if (ads[0].id === 'adNews') popularNoticia(ads[0]);
    ads[0].classList.add('on');
    progress.classList.add('run');
    clearInterval(adTimer);
    adTimer = setInterval(() => {
      ads[cur].classList.remove('on');
      cur = (cur + 1) % ads.length;
      if (ads[cur].id === 'adNews') popularNoticia(ads[cur]);
      ads[cur].classList.add('on');
      progress.classList.remove('run'); void progress.offsetWidth; progress.classList.add('run');
    }, DUR);
  }

  function renderComunicados() {
    const ns = cfg.comunicados || [];
    const t = document.getElementById('nTitle'), b = document.getElementById('nBody'), c = document.getElementById('nCount');
    if (!ns.length) { t.textContent = 'Sem comunicados no momento'; b.textContent = ''; c.textContent = ''; return }
    let ni = 0;
    const mostrar = () => {
      t.textContent = ns[ni].titulo; b.textContent = ns[ni].texto;
      c.textContent = 'Aviso ' + (ni + 1) + ' de ' + ns.length;
    };
    mostrar();
    clearInterval(noticeTimer);
    noticeTimer = setInterval(() => { ni = (ni + 1) % ns.length; mostrar() }, (cfg.duracaoComunicadoSegundos || 10) * 1000);
  }

  async function atualizarConfig() {
    const novo = await buscar('config', 'config.json?v=' + Date.now());
    if (!novo) return;
    const mudou = JSON.stringify(novo) !== JSON.stringify(cfg);
    cfg = novo;
    document.getElementById('predio').textContent = cfg.predio || '';
    document.getElementById('fone').textContent = cfg.contato || '';
    if (mudou) { renderAnuncios(); renderComunicados(); atualizarClima(); }
  }

  // ---------- clima (Open-Meteo, gratuito, sem chave) ----------
  const ICONES = { 0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️' };
  async function atualizarClima() {
    if (!cfg || !cfg.cidade) return;
    const { lat, lon } = cfg.cidade;
    const v = await buscar('clima',
      'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lon + '&daily=temperature_2m_min,temperature_2m_max,weather_code&timezone=America/Sao_Paulo&forecast_days=1',
      (j) => ({ min: Math.round(j.daily.temperature_2m_min[0]), max: Math.round(j.daily.temperature_2m_max[0]), code: j.daily.weather_code[0] }));
    if (!v) return;
    document.getElementById('wx').textContent = v.min + '°/' + v.max + '°';
    document.getElementById('wxIcon').textContent = ICONES[v.code] || '☁️';
  }

  // ---------- cotações (AwesomeAPI, gratuito) ----------
  let fxDados = null, fxi = 0;
  async function atualizarCotacoes() {
    const v = await buscar('fx', 'https://economia.awesomeapi.com.br/json/last/USD-BRL,EUR-BRL', (j) => ([
      { n: 'USD', v: parseFloat(j.USDBRL.bid), s: parseFloat(j.USDBRL.pctChange) >= 0 ? '▴' : '▾' },
      { n: 'EUR', v: parseFloat(j.EURBRL.bid), s: parseFloat(j.EURBRL.pctChange) >= 0 ? '▴' : '▾' },
    ]));
    if (v) fxDados = v;
  }
  function girarCotacao() {
    if (!fxDados) return;
    const f = fxDados[fxi % fxDados.length]; fxi++;
    document.getElementById('fx').textContent = f.n + ' ' + f.v.toFixed(2).replace('.', ',') + ' ' + f.s;
  }
  setInterval(girarCotacao, 6000);

  // ---------- notícias (noticias.json, atualizado pelo GitHub Actions) ----------
  async function atualizarNoticias() {
    const v = await buscar('noticias', 'noticias.json?v=' + Date.now(), (j) => j.noticias);
    noticiasLista = (v || []).map(n => typeof n === 'string' ? { titulo: n } : n);
    const titulos = noticiasLista.length ? noticiasLista.map(n => n.titulo) : ['Notícias indisponíveis no momento'];
    const html = titulos.map(t => { const s = document.createElement('span'); s.textContent = t; return s.outerHTML }).join('');
    document.getElementById('rail').innerHTML = html + html;
    // se o cartão de notícias ainda não existe na rotação, recria os anúncios
    if (cfg && noticiasLista.length && !document.getElementById('adNews')) renderAnuncios();
  }

  // ---------- inicialização e ciclos de atualização ----------
  (async () => {
    cfg = load('config');
    if (cfg) { // liga instantâneo com o que tem salvo
      document.getElementById('predio').textContent = cfg.predio || '';
      document.getElementById('fone').textContent = cfg.contato || '';
      renderAnuncios(); renderComunicados();
    }
    await atualizarConfig();
    if (!cfg) { renderAnuncios && pintarStatus(); }
    atualizarClima(); atualizarCotacoes(); atualizarNoticias();
    girarCotacao();
  })();
  setInterval(atualizarConfig, 5 * 60 * 1000);       // conteúdo: a cada 5 min
  setInterval(atualizarNoticias, 10 * 60 * 1000);    // notícias: a cada 10 min
  setInterval(atualizarCotacoes, 10 * 60 * 1000);    // câmbio: a cada 10 min
  setInterval(atualizarClima, 30 * 60 * 1000);       // clima: a cada 30 min
  // recarrega a página de madrugada para limpar memória e pegar novidades
  setInterval(() => { const h = new Date().getHours(); if (h === 4) location.reload() }, 55 * 60 * 1000);
})();
</script>
</body>
</html>
